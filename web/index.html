<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team CRM — Канбан</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top">
    <div class="brand">Team CRM</div>
    <div class="filters">
      <select id="projectFilter"><option value="">Все проекты</option></select>
      <button id="btnNewProject" type="button">+ Проект</button>
      <button id="btnNewTask" type="button">+ Задача</button>
      <button id="btnNewManager" type="button">+ Менеджер</button>
    </div>
  </header>

  <main id="board" class="board"></main>

  <dialog id="dlg">
    <form method="dialog" id="dlgForm">
      <h3 id="dlgTitle">Новая задача</h3>
      <label>Название <input name="title" required /></label>
      <label>Описание <textarea name="description" rows="3"></textarea></label>
      <label>Проект
        <select name="project_id" id="dlgProject"></select>
      </label>
      <label>Исполнитель
        <select name="assignee_id" id="dlgAssignee"></select>
      </label>
      <label>Тип
        <select name="kind">
          <option value="once">Разовая</option>
          <option value="weekly">Еженедельная</option>
        </select>
      </label>
      <label>Дни (1=пн…7=вс) <input name="weekdays" placeholder="1,3,5" /></label>
      <label>Время уведомления <input name="notify_time" value="09:00" /></label>
      <menu>
        <button value="cancel" type="submit">Отмена</button>
        <button id="dlgSave" value="default" type="submit">Сохранить</button>
      </menu>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team CRM — Канбан</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top">
    <div class="brand">Team CRM</div>
    <div class="filters">
      <select id="projectFilter"><option value="">Все проекты</option></select>
      <button id="btnNewProject" type="button">+ Проект</button>
      <button id="btnNewManager" type="button">+ Менеджер</button>
      <button id="btnLogin" type="button" class="ghost" title="Кто ты в CRM">Войти</button>
      <button id="btnRename" type="button" class="ghost" title="Сменить имя в CRM">Имя</button>
      <span id="meLabel" class="me-label">не вошли</span>
    </div>
  </header>

  <div class="layout">
    <aside class="people">
      <div class="people-head">
        <h2>Команда</h2>
        <button id="btnAllPeople" type="button" class="ghost">Все</button>
      </div>
      <div id="peopleList" class="people-list"></div>
    </aside>

    <section class="workspace">
      <div id="managerBar" class="manager-bar">
        <div>
          <div class="manager-name" id="managerName">Вся команда</div>
          <div class="manager-sub" id="managerSub">Выбери человека слева или пиши задачу ниже</div>
        </div>
        <form id="quickAdd" class="quick-add">
          <select id="assignTo" name="assign_to" title="Кому задача">
            <option value="selected">Выбранному</option>
            <option value="me">Себе</option>
            <option value="boss">Владельцу</option>
          </select>
          <input name="title" placeholder="Текст задачи…" required autocomplete="off" />
          <button type="submit">Назначить</button>
        </form>
      </div>
      <main id="board" class="board"></main>
      <p id="emptyHint" class="empty-hint hidden">Пока пусто — напиши задачу сверху.</p>
    </section>
  </div>

  <dialog id="taskDlg">
    <form id="dlgForm" method="dialog">
      <h3 id="dlgTitle">Задача</h3>
      <input type="hidden" name="id" />
      <label>Текст
        <input name="title" required autocomplete="off" />
      </label>
      <label>Описание
        <textarea name="description" rows="3"></textarea>
      </label>
      <label>Исполнитель
        <select name="assignee_id"></select>
      </label>
      <label>Проект
        <select name="project_id">
          <option value="">Без проекта</option>
        </select>
      </label>
      <label>Статус
        <select name="status">
          <option value="todo">К выполнению</option>
          <option value="doing">В работе</option>
          <option value="done">Сделано</option>
        </select>
      </label>
      <menu>
        <button type="button" id="dlgDelete" class="danger ghost">Удалить</button>
        <button type="button" id="dlgCancel" class="ghost">Отмена</button>
        <button type="submit" id="dlgSave">Сохранить</button>
      </menu>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>

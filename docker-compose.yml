services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_change_me}
      POSTGRES_DB: teamcrm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d teamcrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://crm:${POSTGRES_PASSWORD:-crm_change_me}@db:5432/teamcrm
      TZ: Europe/Moscow
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
